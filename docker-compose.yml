services:
  mongo:
    build:
      context: ./app
      dockerfile: db/Dockerfile
    container_name: land-plots-mongo
    command: ["--config", "/etc/mongod.conf"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    restart: unless-stopped

  mongo-express:
    image: mongo-express:1.0
    container_name: land-plots-mongo-express
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=${MONGO_EXPRESS_MONGODB_URL:-mongodb://mongo:27017}
      - ME_CONFIG_BASICAUTH=${MONGO_EXPRESS_BASICAUTH:-false}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build: ./app/backend
    container_name: land-plots-backend
    env_file:
      - path: ./app/.env
        required: false
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017}
      - MONGODB_DB=${MONGODB_DB:-land_plots}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - JINA_EMBEDDINGS_MODEL=${JINA_EMBEDDINGS_MODEL:-jina-embeddings-v3}
      - JINA_EMBEDDINGS_DIM=${JINA_EMBEDDINGS_DIM:-512}
      - JINA_EMBEDDINGS_BATCH=${JINA_EMBEDDINGS_BATCH:-64}
      - JINA_EMBEDDINGS_TASK=${JINA_EMBEDDINGS_TASK:-text-matching}
      - JWT_SECRET=${JWT_SECRET:-land-plots-dev-secret-key-change-in-prod}
      - PASSWORD_SALT=${PASSWORD_SALT:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - SEED_ADMIN_USERNAME=${SEED_ADMIN_USERNAME:-admin}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-admin}
      - SEED_USER_USERNAME=${SEED_USER_USERNAME:-user}
      - SEED_USER_PASSWORD=${SEED_USER_PASSWORD:-user}
      - UPLOAD_DIR=/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./app/frontend
    container_name: land-plots-frontend
    ports:
      - "127.0.0.1:3000:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
  uploads_data:

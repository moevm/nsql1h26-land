services:
  mongo:
    image: mongo:7
    container_name: land-plots-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  mongo-express:
    image: mongo-express:1.0
    container_name: land-plots-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      - mongo
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: land-plots-backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=land_plots
      - JINA_API_KEY=${JINA_API_KEY:-}
    depends_on:
      - mongo
    volumes:
      - model_cache:/home/appuser/.cache
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: land-plots-frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
  model_cache:
